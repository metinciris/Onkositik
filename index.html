/* ─── SECTION: ALGORİTMA ────────────────────────────────── */
function SectionAlgoritma() {
  const [openSteps, setOpenSteps] = useState({ 1: true, 2: true, 3: false, 4: false, 5: false });
  const [scenario, setScenario] = useState("all");

  const scenarios = [
    { id: "all", label: "Tümü" },
    { id: "ck7cd117", label: "CK7/CD117" },
    { id: "metabolic", label: "Metabolik" },
    { id: "mit", label: "TFE3/TFEB" },
    { id: "biopsy", label: "Biyopsi" },
  ];

  const toggle = (id) => setOpenSteps(s => ({ ...s, [id]: !s[id] }));
  const expandAll = () => setOpenSteps(Object.fromEntries(ALGO_STEPS.map(s => [s.id, true])));
  const collapseAll = () => setOpenSteps(Object.fromEntries(ALGO_STEPS.map(s => [s.id, false])));

  const visible = ALGO_STEPS.filter(s => scenario === "all" || s.tags.includes(scenario));

  return (
    <div>
      <div className="section-title">Adım Adım Algoritma</div>
      <div className="section-sub">Senaryo seçerek ilgili adımları filtreleyin</div>

      <div className="scenario-row">
        {scenarios.map(sc => (
          <button key={sc.id} className={`scenario-pill ${scenario === sc.id ? 'active' : ''}`}
            onClick={() => setScenario(sc.id)}>{sc.label}</button>
        ))}
      </div>

      <div className="btn-row">
        <button className="btn primary" onClick={expandAll}>Tümünü Aç</button>
        <button className="btn" onClick={collapseAll}>Tümünü Kapat</button>
      </div>

      {visible.map(step => (
        <AlgoStep key={step.id} step={step} open={!!openSteps[step.id]}
          onToggle={() => toggle(step.id)} />
      ))}
    </div>
  );
}

/* ─── SECTION: ALT TİPLER ──────────────────────────────── */
function SectionTipler() {
  const [query, setQuery] = useState("");
  const [group, setGroup] = useState("");

  const filtered = useMemo(() => TUMORS.filter(t => {
    const q = query.toLowerCase();
    const matchQ = !q || [t.name, t.morfoloji, t.ihk, t.mol].join(" ").toLowerCase().includes(q);
    const matchG = !group || t.tag === group;
    return matchQ && matchG;
  }), [query, group]);

  return (
    <div>
      <div className="section-title">Alt Tipler</div>
      <div className="section-sub">Morfoloji · IHK · Moleküler korelasyon</div>

      <div className="filter-bar">
        <input className="filter-input" placeholder="Ara: EVT, CK20, FH…"
          value={query} onChange={e => setQuery(e.target.value)} />
        <select className="filter-select" value={group} onChange={e => setGroup(e.target.value)}>
          <option value="">Tüm gruplar</option>
          {Object.entries(GROUP_LABELS).map(([v, l]) => <option key={v} value={v}>{l}</option>)}
        </select>
      </div>

      {filtered.length === 0 && <div className="callout info">Eşleşen alt tip bulunamadı.</div>}

      {filtered.map(t => (
        <div key={t.name} className="tumor-card">
          <div className="tumor-name">
            <span className={`badge ${BADGE_COLOR[t.badge] || 'default'}`}>{
              t.badge === 'ok' ? 'Benign/İndolent' : t.badge === 'warn' ? 'Dikkatli' : 'Agresif risk'
            }</span>
            {t.name}
          </div>
          <div className="tumor-row">
            <div className="tumor-row-label">Morfoloji</div>
            <div className="tumor-row-val">{t.morfoloji}</div>
          </div>
          <div className="tumor-row">
            <div className="tumor-row-label">IHK</div>
            <div className="tumor-row-val">{t.ihk}</div>
          </div>
          <div className="tumor-row">

            <div className="tumor-row-val">{t.mol}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

              onClick={() => setActive(t.id)}>{t.icon} {t.label}</button>
          ))}
        </div>
      </nav>

      <main className="main">
        <ActiveSection />
      </main>

      {/* Mobile bottom nav */}
      <nav className="bottom-nav">
        {TABS.map(t => (
          <button key={t.id} className={`bnav-item ${active === t.id ? 'active' : ''}`}
            onClick={() => { setActive(t.id); window.scrollTo(0,0); }}>
            <span className="bnav-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
